3,27],[22,27],[23,27],[24,27],[33,27],[34,27],[35,27],[44,27],[45,27],[46,27],[68,27],[69,27],[70,27],[10,28],[11,28],[12,28],[22,28],[23,28],[24,28],[32,28],[33,28],[34,28],[44,28],[45,28],[46,28],[68,28],[69,28],[70,28],[10,29],[11,29],[22,29],[23,29],[24,29],[32,29],[33,29],[44,29],[45,29],[46,29],[69,29],[70,29],[71,29],[9,30],[10,30],[11,30],[12,30],[13,30],[14,30],[15,30],[16,30],[17,30],[18,30],[19,30],[20,30],[21,30],[22,30],[23,30],[24,30],[25,30],[26,30],[27,30],[28,30],[31,30],[32,30],[33,30],[34,30],[35,30],[36,30],[37,30],[38,30],[39,30],[40,30],[41,30],[42,30],[43,30],[44,30],[45,30],[46,30],[47,30],[48,30],[49,30],[50,30],[69,30],[70,30],[71,30],[9,31],[10,31],[11,31],[12,31],[13,31],[14,31],[15,31],[16,31],[17,31],[18,31],[19,31],[20,31],[21,31],[22,31],[23,31],[24,31],[25,31],[26,31],[27,31],[28,31],[31,31],[32,31],[33,31],[34,31],[35,31],[36,31],[37,31],[38,31],[39,31],[40,31],[41,31],[42,31],[43,31],[44,31],[45,31],[46,31],[47,31],[48,31],[49,31],[50,31],[69,31],[70,31],[71,31],[9,32],[10,32],[11,32],[12,32],[13,32],[14,32],[15,32],[16,32],[17,32],[18,32],[19,32],[20,32],[21,32],[22,32],[23,32],[24,32],[25,32],[26,32],[27,32],[28,32],[31,32],[32,32],[33,32],[34,32],[35,32],[36,32],[37,32],[38,32],[39,32],[40,32],[41,32],[42,32],[43,32],[44,32],[45,32],[46,32],[47,32],[48,32],[49,32],[50,32],[68,32],[69,32],[70,32],[71,32],[22,33],[23,33],[24,33],[44,33],[45,33],[46,33],[68,33],[69,33],[70,33],[22,34],[23,34],[24,34],[44,34],[45,34],[46,34],[67,34],[68,34],[69,34],[70,34],[22,35],[23,35],[24,35],[44,35],[45,35],[46,35],[54,35],[55,35],[66,35],[67,35],[68,35],[69,35],[22,36],[23,36],[24,36],[44,36],[45,36],[46,36],[54,36],[55,36],[56,36],[57,36],[58,36],[59,36],[60,36],[61,36],[62,36],[63,36],[64,36],[65,36],[66,36],[67,36],[68,36],[22,37],[23,37],[24,37],[44,37],[45,37],[46,37],[54,37],[55,37],[56,37],[57,37],[58,37],[59,37],[60,37],[61,37],[62,37],[63,37],[64,37],[65,37],[66,37],[67,37],[22,38],[23,38],[24,38],[44,38],[45,38],[46,38],[58,38],[59,38],[60,38],[61,38],[62,38],[63,38],[64,38]];

const canvas = document.getElementById('c');
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext('2d');

const N = DIGIT_PIXELS.length;                  // 503 pixels réels
const perSlice = Math.ceil(N / N_SLICES);        // pixels par tranche

// Pré-découper les pixels réels en N_SLICES tranches (ordre aléatoire stable)
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

let slices = [];
function rebuildSlices() {
  const shuffled = shuffle([...Array(N).keys()]);
  slices = [];
  for (let s = 0; s < N_SLICES; s++) {
    slices.push(shuffled.slice(s * perSlice, (s + 1) * perSlice).map(i => DIGIT_PIXELS[i]));
  }
}
rebuildSlices();

// Phosphor color
const PR = 210, PG = 255, PB = 190;

let slice = 0;
let lastTime = 0;

function drawFrame(ts) {
  if (ts - lastTime < FRAME_MS) { requestAnimationFrame(drawFrame); return; }
  lastTime = ts;

  // Nouveau cycle : reconstruire les tranches avec un nouvel ordre aléatoire
  // → le bruit change à chaque cycle, statistiquement indétectable
  if (slice === 0) rebuildSlices();

  const imgData = ctx.createImageData(W, H);
  const d = imgData.data;

  // Fond noir
  // (déjà à 0 par défaut, on met juste alpha=255)
  for (let i = 3; i < d.length; i += 4) d[i] = 255;

  const currentSlice = slices[slice];
  const noiseCount = currentSlice.length;

  // Pixels réels de cette tranche
  for (const [px, py] of currentSlice) {
    const x0 = px * SCALE, y0 = py * SCALE;
    for (let dy = 0; dy < SCALE; dy++) {
      for (let dx = 0; dx < SCALE; dx++) {
        const idx = ((y0 + dy) * W + (x0 + dx)) * 4;
        d[idx]   = PR;
        d[idx+1] = PG;
        d[idx+2] = PB;
      }
    }
  }

  // Bruit aléatoire — même nombre, même couleur, positions fraîches à chaque cycle
  for (let n = 0; n < noiseCount; n++) {
    const nx = Math.floor(Math.random() * ORIG_W);
    const ny = Math.floor(Math.random() * ORIG_H);
    const x0 = nx * SCALE, y0 = ny * SCALE;
    // Ne pas écraser un pixel réel
    const idx = (y0 * W + x0) * 4;
    if (d[idx] === 0) {
      for (let dy = 0; dy < SCALE; dy++) {
        for (let dx = 0; dx < SCALE; dx++) {
          const i = ((y0 + dy) * W + (x0 + dx)) * 4;
          d[i]   = PR;
          d[i+1] = PG;
          d[i+2] = PB;
        }
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);

  slice = (slice + 1) % N_SLICES;
  requestAnimationFrame(drawFrame);
}

requestAnimationFrame(drawFrame);
